<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinematic Premium Navigation</title>
    <style>
      /* CSS VARIABLES & RESET */
      :root {
        --azcPrimary: #102973;
        --azcBackground: #e4ebff;
        --azcWhite: #ffffff;
        --azcGlass: rgba(255, 255, 255, 0.7);
        --azcShadow: 0 10px 30px rgba(16, 41, 115, 0.1);
        --azcTransition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        background-color: var(--azcBackground);
        min-height: 200vh; /* For scroll testing */
      }

      /* NAVBAR CONTAINER */
      .azcNavbarWrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        padding: 25px 50px;
        transition: var(--azcTransition);
      }

      .azcNavbarWrapper.azcScrolled {
        padding: 15px 50px;
        background: var(--azcGlass);
        backdrop-filter: blur(15px);
        box-shadow: var(--azcShadow);
      }

      .azcNavbarInner {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      /* LOGO */
      .azcLogoContainer {
        width: 150px;
        display: flex;
        align-items: center;
      }

      .azcLogoImg {
        height: 40px;
        display: block;
      }

      /* DESKTOP MENU */
      .azcDesktopMenu {
        display: flex;
        align-items: center;
        gap: 35px;
      }

      .azcNavItem {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--azcPrimary);
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.5px;
        position: relative;
        padding: 8px 0;
        transition: var(--azcTransition);
      }

      .azcNavItem svg {
        width: 18px;
        height: 18px;
        transition: var(--azcTransition);
      }

      .azcNavItem:hover svg {
        transform: translateY(-3px);
        color: #000;
      }

      /* Hover Underline Animation */
      .azcNavItem::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--azcPrimary);
        transition: var(--azcTransition);
      }

      .azcNavItem:hover::after {
        width: 100%;
      }

      /* BUTTONS */
      .azcActions {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .azcBtn {
        padding: 12px 24px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        transition: var(--azcTransition);
        border: none;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
      }

      .azcBtnLogin {
        background: transparent;
        color: var(--azcPrimary);
        border: 2px solid var(--azcPrimary);
      }

      .azcBtnLogin:hover {
        background: var(--azcPrimary);
        color: var(--azcWhite);
        box-shadow: 0 0 15px rgba(16, 41, 115, 0.3);
      }

      .azcBtnStarted {
        background: var(--azcPrimary);
        color: var(--azcWhite);
      }

      .azcBtnStarted:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(16, 41, 115, 0.4);
      }

      /* HAMBURGER */
      .azcHamburger {
        display: none;
        flex-direction: column;
        justify-content: space-between;
        width: 32px;
        height: 20px;
        cursor: pointer;
        z-index: 1001;
      }

      .azcHamburger span {
        display: block;
        height: 3px;
        width: 100%;
        background: var(--azcPrimary);
        border-radius: 10px;
        transition: var(--azcTransition);
      }

      .azcHamburger span:nth-child(2) {
        width: 70%;
        margin-left: auto;
      }

      /* MOBILE MENU */
      .azcMobileMenu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 100%;
        height: 100vh;
        background: rgba(228, 235, 255, 0.98);
        backdrop-filter: blur(20px);
        z-index: 2000;
        transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
        display: flex;
        flex-direction: column;
        padding: 40px;
      }

      .azcMobileMenu.azcOpen {
        right: 0;
      }

      .azcCloseBtn {
        position: absolute;
        top: 40px;
        left: 40px;
        width: 50px;
        height: 50px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--azcWhite);
        border-radius: 50%;
        box-shadow: var(--azcShadow);
        transition: var(--azcTransition);
      }

      .azcCloseBtn:hover {
        transform: rotate(90deg) scale(1.1);
      }

      .azcMobileContent {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-end;
        text-align: right;
      }

      .azcMobileLinks {
        display: flex;
        flex-direction: column;
        gap: 30px;
        margin-bottom: 50px;
      }

      .azcMobileItem {
        font-size: 32px;
        font-weight: 800;
        color: var(--azcPrimary);
        text-decoration: none;
        opacity: 0;
        transform: translateX(50px);
        transition: 0.5s var(--azcTransition);
      }

      .azcOpen .azcMobileItem {
        opacity: 1;
        transform: translateX(0);
      }

      .azcMobileActions {
        display: flex;
        flex-direction: column;
        gap: 15px;
        opacity: 0;
        transform: translateY(20px);
        transition: 0.5s var(--azcTransition);
        transition-delay: 0.4s;
      }

      .azcOpen .azcMobileActions {
        opacity: 1;
        transform: translateY(0);
      }

      /* RESPONSIVE */
      @media (max-width: 1024px) {
        .azcDesktopMenu,
        .azcActions {
          display: none;
        }
        .azcHamburger {
          display: flex;
        }
        .azcNavbarWrapper {
          padding: 20px 30px;
        }
        .azcNavbarWrapper.azcScrolled {
          padding: 15px 30px;
        }
      }

      /* RIPPLE EFFECT */
      .azcRipple {
        position: absolute;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transform: scale(0);
        animation: azcRippleAnim 0.6s linear;
        pointer-events: none;
      }

      @keyframes azcRippleAnim {
        to {
          transform: scale(4);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <nav class="azcNavbarWrapper" id="azcNavbar">
      <div class="azcNavbarInner">
        <div class="azcLogoContainer">
          <!-- User to add src later -->
          <img
            src="./assets/logo.webp"
            alt="LOGO"
            class="azcLogoImg"
            id="azclogo"
            onclick="window.location.href = './index.html'"
            style="cursor: pointer"
          />
        </div>

        <div class="azcDesktopMenu">
          <a href="./index.html" class="azcNavItem">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            HOME
          </a>
          <a href="./events.html" class="azcNavItem">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            EVENTS
          </a>
          <a href="./about.html" class="azcNavItem">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="16" x2="12" y2="12" />
              <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
            ABOUT
          </a>
          <a href="./blog.html" class="azcNavItem">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path
                d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"
              />
            </svg>
            BLOG
          </a>
          <a href="./contact.html" class="azcNavItem">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            CONTACT
          </a>
        </div>

        <div class="azcActions">
          <button
            class="azcBtn azcBtnLogin"
            onclick="window.location.href = './login.html'"
          >
            LOGIN
          </button>
          <button
            class="azcBtn azcBtnStarted"
            onclick="window.location.href = './signup.html'"
          >
            GET STARTED
          </button>
        </div>

        <div class="azcHamburger" id="azcHamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </nav>

    <div class="azcMobileMenu" id="azcMobileMenu">
      <div class="azcCloseBtn" id="azcClose">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#102973"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </div>

      <div class="azcMobileContent">
        <div class="azcMobileLinks">
          <a
            href="./index.html"
            class="azcMobileItem"
            style="transition-delay: 0.1s"
            >HOME</a
          >
          <a
            href="./events.html"
            class="azcMobileItem"
            style="transition-delay: 0.2s"
            >EVENTS</a
          >
          <a
            href="./about.html"
            class="azcMobileItem"
            style="transition-delay: 0.3s"
            >ABOUT</a
          >
          <a
            href="./blog.html"
            class="azcMobileItem"
            style="transition-delay: 0.4s"
            >BLOG</a
          >
          <a
            href="./contact.html"
            class="azcMobileItem"
            style="transition-delay: 0.5s"
            >CONTACT</a
          >
        </div>
        <div class="azcMobileActions">
          <button
            class="azcBtn azcBtnLogin"
            onclick="window.location.href = './login.html'"
          >
            LOGIN
          </button>
          <button
            class="azcBtn azcBtnStarted"
            onclick="window.location.href = './signup.html'"
          >
            GET STARTED
          </button>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const navbar = document.getElementById("azcNavbar");
        const hamburger = document.getElementById("azcHamburger");
        const mobileMenu = document.getElementById("azcMobileMenu");
        const closeBtn = document.getElementById("azcClose");
        const buttons = document.querySelectorAll(".azcBtn");

        // Scroll Effect
        window.addEventListener("scroll", () => {
          if (window.scrollY > 50) {
            navbar.classList.add("azcScrolled");
          } else {
            navbar.classList.remove("azcScrolled");
          }
        });

        // Mobile Menu Toggle
        const toggleMenu = () => {
          mobileMenu.classList.toggle("azcOpen");
          document.body.style.overflow = mobileMenu.classList.contains(
            "azcOpen",
          )
            ? "hidden"
            : "auto";
        };

        hamburger.addEventListener("click", toggleMenu);
        closeBtn.addEventListener("click", toggleMenu);

        // Close menu on link click
        document.querySelectorAll(".azcMobileItem").forEach((item) => {
          item.addEventListener("click", toggleMenu);
        });

        // Ripple Effect for Buttons
        buttons.forEach((btn) => {
          btn.addEventListener("click", function (e) {
            let x = e.clientX - e.target.getBoundingClientRect().left;
            let y = e.clientY - e.target.getBoundingClientRect().top;

            let ripple = document.createElement("span");
            ripple.className = "azcRipple";
            ripple.style.left = x + "px";
            ripple.style.top = y + "px";
            this.appendChild(ripple);

            setTimeout(() => {
              ripple.remove();
            }, 600);
          });
        });

        // Active Link Highlight Logic
        const navItems = document.querySelectorAll(".azcNavItem");
        navItems.forEach((item) => {
          item.addEventListener("click", function () {
            navItems.forEach((nav) => (nav.style.color = "var(--azcPrimary)"));
            this.style.color = "#000";
          });
        });
      });
    </script>
  </body>
</html>
